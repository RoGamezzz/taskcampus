<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskCampus App Kevin Roman</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6 font-sans">

    <h1 class="text-3xl font-bold text-center text-blue-700 mb-6">📚 TaskCampus</h1>

    <!-- RESUMEN -->
    <div id="resumen" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

    <!-- FILTROS -->
    <div class="bg-white rounded-xl p-4 mb-6 shadow flex flex-wrap gap-3">
        <select id="filtroEstado" class="border rounded p-2">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="en proceso">En proceso</option>
            <option value="finalizada">Finalizada</option>
        </select>
        <select id="filtroPrioridad" class="border rounded p-2">
            <option value="">Todas las prioridades</option>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
        </select>
        <input id="filtroAsignatura" type="text" placeholder="Asignatura..." class="border rounded p-2" />
        <button onclick="aplicarFiltros()"
            class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Filtrar</button>
        <button onclick="limpiarFiltros()" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Limpiar</button>
        <button onclick="mostrarFormulario()"
            class="ml-auto bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">+ Nueva tarea</button>
    </div>

    <!-- FORMULARIO -->
    <div id="formulario" class="hidden bg-white rounded-xl p-6 mb-6 shadow">
        <h2 id="formTitulo" class="text-xl font-semibold mb-4">Nueva tarea</h2>
        <input type="hidden" id="tareaId" />
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="titulo" placeholder="Título *" class="border rounded p-2" />
            <input id="asignatura" placeholder="Asignatura *" class="border rounded p-2" />
            <input id="fecha_entrega" type="date" class="border rounded p-2" />
            <select id="prioridad" class="border rounded p-2">
                <option value="baja">Baja</option>
                <option value="media">Media</option>
                <option value="alta">Alta</option>
            </select>
            <select id="estado" class="border rounded p-2">
                <option value="pendiente">Pendiente</option>
                <option value="en proceso">En proceso</option>
                <option value="finalizada">Finalizada</option>
            </select>
            <textarea id="descripcion" placeholder="Descripción" class="border rounded p-2 md:col-span-2"></textarea>
        </div>
        <div class="flex gap-3 mt-4">
            <button onclick="guardarTarea()"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Guardar</button>
            <button onclick="cerrarFormulario()" class="bg-gray-300 px-6 py-2 rounded">Cancelar</button>
        </div>
    </div>

    <!-- LISTA -->
    <div id="lista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <script type="module" src="dist/main.js"></script>
</body>

</html>
